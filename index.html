<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 選股擂台</title>
    <link rel="stylesheet" href="assets/style.css">
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>AI 選股擂台 Claude × ChatGPT × Gemini・台股實戰紀錄</h1>
        <nav>
            <button class="nav-btn active" onclick="switchSection('dashboard')">總覽</button>
            <button class="nav-btn" onclick="switchSection('journal')">覆盤分析</button>
            <a href="admin.html" class="nav-btn admin-link">後台管理</a>
        </nav>
    </header>

    <main class="container">
        <!-- 總覽 Section -->
        <section id="dashboard" class="content-section active">
            
            <!-- 統計卡片 -->
            <div class="dashboard-stats">
                <div class="stat-card">
                    <h3>總資產</h3>
                    <p id="total-value" class="amount">$0</p>
                </div>
                <div class="stat-card">
                    <h3>今日 P&L</h3>
                    <p id="today-pnl" class="amount">$0</p>
                    <p id="today-pnl-percent" class="percent">0.00%</p>
                </div>
                <div class="stat-card">
                    <h3>未實現 P&L</h3>
                    <p id="unrealized-pnl" class="amount">$0</p>
                    <p id="unrealized-pnl-percent" class="percent">0.00%</p>
                </div>
                <div class="stat-card">
                    <h3>累積 P&L (含已實現)</h3>
                    <p id="total-pnl" class="amount">$0</p>
                    <p id="total-pnl-percent" class="percent">0.00%</p>
                </div>
                <div class="stat-card">
                    <h3>現金餘額</h3>
                    <p id="cash-balance" class="amount">$0</p>
                </div>
            </div>

            <!-- 圖表上半部 -->
            <div class="charts-row">
                <div class="chart-container half-width">
                    <h3>累積報酬走勢</h3>
                    <div style="position: relative; height: 300px;">
                        <canvas id="performance-chart"></canvas>
                    </div>
                </div>
                <div class="chart-container half-width">
                    <h3>資產配置</h3>
                    <!-- 移除了原本的 logo 圖片 -->
                    <div class="holdings-chart-container" style="position: relative; height: 300px;">
                        <canvas id="holdings-pie-chart"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- 圖表下半部 -->
            <div class="charts-row">
                <div class="chart-container full-width">
                    <h3>持股投資金額排序</h3>
                    <div style="position: relative; height: 250px;">
                        <canvas id="holdings-bar-chart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 持股明細表格 -->
            <div class="table-responsive">
                <table class="data-table" id="holdings-table">
                    <thead>
                        <tr>
                            <th>標的</th>
                            <th>名稱</th>
                            <th>股數</th>
                            <th>成本價</th>
                            <th>市價</th>
                            <th>未實現損益</th>
                            <th>佔比</th>
                        </tr>
                    </thead>
                    <tbody id="holdings-tbody">
                        <!-- 資料由 JS 動態渲染 -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 覆盤分析 Section -->
        <section id="journal" class="content-section">
            <div class="section-header">
                <h2>週報與覆盤分析</h2>
                <div class="journal-filter">
                    <label for="journal-date">依日期篩選：</label>
                    <input type="date" id="journal-date" onchange="filterJournal()">
                </div>
            </div>
            <div id="journal-list">
                <!-- 日誌資料由 JS 動態渲染 -->
            </div>
        </section>
    </main>
    
    <script src="assets/app.js"></script>
</body>
</html>
