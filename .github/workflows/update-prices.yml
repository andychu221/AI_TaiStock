name: Update TWSE Closing Prices

on:
  schedule:
    # 每個週一到週五，UTC 07:00（台北時間 15:00，台股收盤後）自動執行
    - cron: '0 7 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch closing prices
        run: python scripts/update_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name "price-bot"
          git config user.email "actions@github.com"
          git add data/prices.json
          git diff --cached --quiet || git commit -m "chore: update TWSE closing prices $(date -u +'%Y-%m-%d')"
          git push
